name: Organize Pages

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform (move_file / rebuild_index)'
        required: true
      payload:
        description: 'JSON payload'
        required: true

jobs:
  organize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run organize script
        run: python scripts/organize.py '${{ github.event.inputs.action }}' '${{ github.event.inputs.payload }}'

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "organize: ${{ github.event.inputs.action }}"
          git push
